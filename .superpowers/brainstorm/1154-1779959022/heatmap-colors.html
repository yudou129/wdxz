<h2>热力图配色方案选择</h2>
<p class="subtitle">得分 0~1 的渐变配色</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>绿→黄→红（需求文档方案）</h3>
      <p>低分(0) → 绿，高分(1) → 红</p>
      <p style="margin-top:8px;font-size:13px;background:linear-gradient(to right,#00ff00,#ffff00,#ff0000);height:24px;border-radius:4px;"></p>
      <p style="font-size:12px;color:#888;margin-top:4px;">红色醒目突出高价值区域</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>红→黄→绿（红绿灯方案）</h3>
      <p>低分(0) → 红，高分(1) → 绿</p>
      <p style="margin-top:8px;font-size:13px;background:linear-gradient(to right,#ff0000,#ffff00,#00ff00);height:24px;border-radius:4px;"></p>
      <p style="font-size:12px;color:#888;margin-top:4px;">绿色表示"好位置"，直觉符合红绿灯</p>
    </div>
  </div>
</div>
